<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.svg" />
  <title>World Cup 2026 Predictor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="text-slate-200 min-h-screen">
  <!-- Shared navigation bar -->
  <header class="border-b border-slate-800/80 bg-slate-950/60 backdrop-blur sticky top-0 z-40">
    <nav class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/index.html" class="text-lg font-extrabold brand-gradient tracking-tight">⚽ World Cup 2026 Predictor</a>
      <div class="flex items-center gap-1">
        <a href="/index.html"
           class="px-4 py-2 rounded-lg text-sm font-semibold bg-emerald-500/10 text-emerald-400 ring-1 ring-emerald-500/20">Bracket</a>
        <a href="/predecir.html"
           class="px-4 py-2 rounded-lg text-sm font-medium text-slate-400 hover:text-slate-100 hover:bg-slate-800/60 transition">Predict a match</a>
      </div>
    </nav>
  </header>

  <main class="px-6 py-10">
    <section id="wc-knockout">
      <div class="max-w-6xl mx-auto text-center mb-10">
        <h1 class="text-4xl font-extrabold text-slate-50 tracking-tight mb-3">Knockout Bracket</h1>
        <p class="text-slate-400">Click any match to see the algorithm's prediction. <span class="text-yellow-400">Yellow</span> scores mean a draw decided on penalties.</p>
      </div>

      <!-- El bracket se escala por JS (ajustarEscala) para caber siempre en pantalla -->
      <div class="w-full overflow-x-auto">
        <div id="bracket-escalable" class="w-max mx-auto rounded-2xl border border-slate-800/80 bg-slate-900/40 p-4 md:p-6 shadow-2xl shadow-black/40">
          <div class="flex items-stretch justify-center gap-1">
            <div id="bracket-izq" class="brackets-viewer"></div>
            <div id="bracket-final" class="flex items-center px-2"></div>
            <div id="bracket-der" class="brackets-viewer bracket-espejo"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="max-w-6xl mx-auto px-6 py-8 text-center text-xs text-slate-600">
    Poisson model · Built with FastAPI + Vite
  </footer>

  <!-- Match detail modal (hidden by default) -->
  <div id="modalOverlay" class="modal-overlay oculto">
    <div class="modal-contenido">
      <button id="cerrarModal" class="cerrar">&times;</button>
      <div id="modalDetalle"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
